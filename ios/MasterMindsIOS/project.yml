name: MasterMindsIOS
options:
  bundleIdPrefix: com.masterminds
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    CODE_SIGN_STYLE: Automatic
targets:
  MasterMindsIOS:
    type: application
    platform: iOS
    sources:
      - path: MasterMindsIOS
    info:
      path: MasterMindsIOS/Info.plist
      properties:
        CFBundleDisplayName: 神仙会
        CFBundleName: 神仙会
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.angwei.shenxianhui
        CODE_SIGN_ENTITLEMENTS: MasterMindsIOS/MasterMindsIOS.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
  MasterMindsIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MasterMindsIOSTests
    dependencies:
      - target: MasterMindsIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.masterminds.ios.tests
